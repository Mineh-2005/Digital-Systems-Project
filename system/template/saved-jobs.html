<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saved Jobs — MarketMatch</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
    <style>
        .gradient-btn {
            background: linear-gradient(135deg, var(--violet) 0%, var(--purple) 100%);
            color: white; border: none; cursor: pointer;
            transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(102,126,234,0.25);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 700;
        }
        .gradient-btn:hover {
            opacity: 0.92; transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(102,126,234,0.35);
        }
        .job-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
            position: relative;
        }
        .job-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
            border-color: rgba(102,126,234,0.25);
        }
        .score-badge {
            display: inline-flex; align-items: center; justify-content: center;
            width: 52px; height: 52px; border-radius: 12px;
            font-size: 1rem; font-weight: 800;
            flex-shrink: 0;
        }
        .score-high   { background: rgba(102,126,234,0.1); color: var(--violet); border: 1px solid rgba(102,126,234,0.2); }
        .score-medium { background: rgba(118,75,162,0.08); color: var(--purple); border: 1px solid rgba(118,75,162,0.15); }
        .score-low    { background: rgba(139,146,174,0.1); color: var(--muted);  border: 1px solid var(--border); }
        .chip {
            display: inline-flex; padding: 0.25rem 0.7rem;
            border-radius: 100px; font-size: 0.72rem; font-weight: 600;
        }
        .chip-violet { background: var(--violet-pale); color: var(--violet); border: 1px solid rgba(102,126,234,0.18); }
        .chip-gray   { background: var(--bg); color: var(--muted); border: 1px solid var(--border); }
        .chip-green  { background: rgba(52,211,153,0.1); color: #059669; border: 1px solid rgba(52,211,153,0.2); }
        .remove-btn {
            background: none; border: none; cursor: pointer;
            color: var(--muted); border-radius: 8px; padding: 0.4rem;
            transition: background 0.2s, color 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .remove-btn:hover { background: #fef2f2; color: #ef4444; }
        .sort-btn {
            padding: 0.45rem 0.875rem; border-radius: 8px;
            font-size: 0.8rem; font-weight: 600; color: var(--text-sm);
            background: white; border: 1px solid var(--border);
            cursor: pointer; transition: background 0.2s, border-color 0.2s, color 0.2s;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .sort-btn:hover, .sort-btn.active {
            background: var(--violet-pale);
            border-color: rgba(102,126,234,0.3);
            color: var(--violet);
        }
        .fade-in   { animation: fadeInUp 0.4s ease both; }
        .fade-in-1 { animation: fadeInUp 0.4s 0.05s ease both; }
        .fade-in-2 { animation: fadeInUp 0.4s 0.10s ease both; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- NAV -->
    <nav class="mm-nav" id="mmNav">
        <div class="mm-nav-inner">
            <a href="/dashboard" class="mm-logo">
                <div class="mm-logo-mark">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
                    </svg>
                </div>
                MarketMatch
            </a>

            <div class="mm-nav-links">
                <a href="/dashboard" class="mm-nav-link">Dashboard</a>
                <a href="/upload" class="mm-nav-link">Upload CV</a>
                <a href="/results" class="mm-nav-link">Jobs</a>
                <a href="/saved-jobs" class="mm-nav-link active">Saved Jobs</a>
                <a href="/admin" id="adminNavLink" class="mm-nav-link" style="display:none;color:var(--purple);font-weight:700">Admin</a>
            </div>

            <div class="mm-nav-right">
                <a href="/profile" id="navGreeting" class="mm-nav-greeting">Welcome, [Name]!</a>
                <button onclick="logout()" class="mm-logout-btn">Logout</button>
            </div>
        </div>
    </nav>

    <!-- MAIN -->
    <main style="max-width:1200px;margin:0 auto;padding:2.5rem 2rem 4rem">

        <!-- Page Header -->
        <div class="fade-in" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:2rem">
            <div>
                <p style="font-size:0.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:0.35rem">Bookmarked</p>
                <h1 style="font-size:clamp(1.4rem,3vw,2rem);font-weight:800;letter-spacing:-0.5px;color:var(--text)">
                    Saved Jobs
                    <span id="savedCount" style="font-size:1rem;font-weight:600;color:var(--muted);margin-left:0.5rem"></span>
                </h1>
            </div>
            <!-- Sort controls -->
            <div id="sortControls" style="display:none;align-items:center;gap:0.5rem;flex-wrap:wrap">
                <span style="font-size:0.78rem;color:var(--muted);font-weight:500">Sort by:</span>
                <button class="sort-btn" onclick="sortJobs('score')"  id="sortScore">Match Score</button>
                <button class="sort-btn" onclick="sortJobs('salary')" id="sortSalary">Salary</button>
            </div>
        </div>

        <!-- ── EMPTY STATE ── -->
        <div id="emptyState" class="fade-in-1" style="text-align:center;padding:5rem 2rem">
            <div style="width:64px;height:64px;border-radius:18px;background:var(--violet-pale);border:1px solid rgba(102,126,234,0.15);display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem">
                <svg width="30" height="30" fill="none" stroke="var(--violet)" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.6" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/>
                </svg>
            </div>
            <h2 style="font-size:1.2rem;font-weight:700;color:var(--text);margin-bottom:0.5rem">No saved jobs yet</h2>
            <p style="font-size:0.9rem;color:var(--muted);line-height:1.7;max-width:360px;margin:0 auto 1.75rem">
                When you find a role you like, hit <strong style="color:var(--text)">Save Job</strong> on the job details page and it'll appear here.
            </p>
            <a href="/results" class="gradient-btn"
                style="display:inline-flex;align-items:center;gap:0.5rem;padding:0.75rem 1.75rem;border-radius:10px;font-size:0.9rem;text-decoration:none">
                Browse Matched Jobs
                <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
                </svg>
            </a>
        </div>

        <!-- ── JOBS GRID ── -->
        <div id="jobsGrid" style="display:none;flex-direction:column;gap:1rem"></div>

        <!-- ── CLEAR ALL ── -->
        <div id="clearAllRow" style="display:none;margin-top:2rem;text-align:center">
            <button onclick="confirmClearAll()" class="mm-danger-link-btn">
                Clear all saved jobs
            </button>
        </div>

    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

    <script>
        let savedJobs  = [];
        let sortMode   = 'saved';

        window.onload = function () {
            if (!checkLogin()) return;
            initNav();

            if (!localStorage.getItem('userLoggedIn')) {
                window.location.href = '/login';
                return;
            }
            loadSavedJobs();
        };

        function loadSavedJobs() {
            savedJobs = JSON.parse(localStorage.getItem('savedJobs') || '[]');
            renderJobs();
        }

        function renderJobs() {
            const grid       = document.getElementById('jobsGrid');
            const emptyState = document.getElementById('emptyState');
            const clearRow   = document.getElementById('clearAllRow');
            const sortCtrls  = document.getElementById('sortControls');
            const countEl    = document.getElementById('savedCount');

            if (savedJobs.length === 0) {
                grid.style.display       = 'none';
                clearRow.style.display   = 'none';
                sortCtrls.style.display  = 'none';
                emptyState.style.display = 'block';
                countEl.textContent = '';
                return;
            }

            emptyState.style.display = 'none';
            grid.style.display      = 'flex';
            clearRow.style.display  = 'block';
            sortCtrls.style.display = 'flex';
            countEl.textContent     = `(${savedJobs.length})`;

            // Sort
            const sorted = [...savedJobs];
            if (sortMode === 'score')  sorted.sort((a, b) => (b.final_score || 0) - (a.final_score || 0));
            if (sortMode === 'salary') sorted.sort((a, b) => (b.min_salary || 0) - (a.min_salary || 0));

            grid.innerHTML = '';
            sorted.forEach((job, idx) => {
                grid.appendChild(buildCard(job, idx));
            });
        }

        function parseSkills(skillsData) {
            if (!skillsData) return [];
            if (Array.isArray(skillsData)) return skillsData;
            if (typeof skillsData === 'string') {
                // Handles cases where skills might be a string like "Python, Java" or "[Python, Java]"
                try {
                    const cleaned = skillsData.replace(/'/g, '"');
                    return JSON.parse(cleaned);
                } catch (e) {
                    return skillsData.split(',').map(s => s.trim());
                }
            }
            return [];
        }

        function buildCard(job, idx) {
            const score = job.final_score ? Math.round(job.final_score * 100) : null;
            const scoreClass = score >= 80 ? 'score-high' : score >= 60 ? 'score-medium' : 'score-low';
            const scoreLabel = score !== null ? score + '%' : '—';

            const minSal = job.min_salary ? '£' + Number(job.min_salary).toLocaleString() : null;
            const maxSal = job.max_salary ? '£' + Number(job.max_salary).toLocaleString() : null;
            const salaryRange = (minSal && maxSal) ? `${minSal} – ${maxSal}` : (minSal || '—');

            const skills = parseSkills(job.required_skills);

            const skillChips = skills.slice(0, 4).map(s =>
                `<span class="chip chip-violet">${s}</span>`
            ).join('') + (skills.length > 4 ? `<span class="chip chip-gray">+${skills.length - 4} more</span>` : '');

            const card = document.createElement('div');
            card.className = 'job-card fade-in';
            card.style.animationDelay = (idx * 0.04) + 's';

            card.innerHTML = `
                <div style="display:flex;align-items:flex-start;gap:1rem;margin-bottom:1.1rem">
                    <div class="score-badge ${scoreClass}">${scoreLabel}</div>

                    <div style="flex:1;min-width:0">
                        <h3 style="font-size:1rem;font-weight:700;color:var(--text);margin-bottom:0.25rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
                            ${job.job_title || 'Untitled Role'}
                        </h3>
                        <div style="display:flex;align-items:center;gap:1.25rem;flex-wrap:wrap">
                            <span style="font-size:0.82rem;color:var(--text-sm);display:flex;align-items:center;gap:0.3rem">
                                <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
                                ${job.company_name || '—'}
                            </span>
                            <span style="font-size:0.82rem;color:var(--text-sm);display:flex;align-items:center;gap:0.3rem">
                                <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                                ${job.location || '—'}
                            </span>
                            <span style="font-size:0.82rem;color:var(--text-sm);display:flex;align-items:center;gap:0.3rem">
                                <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                ${salaryRange}
                            </span>
                        </div>
                    </div>

                    <button class="remove-btn" onclick="removeJob(${job.job_id})" title="Remove from saved">
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                        </svg>
                    </button>
                </div>

                <div style="display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:1.1rem">
                    ${job.employment_type ? `<span class="chip chip-gray">${job.employment_type}</span>` : ''}
                    ${job.experience_level ? `<span class="chip chip-gray">${job.experience_level}</span>` : ''}
                    ${job.industry ? `<span class="chip chip-green">${job.industry}</span>` : ''}
                </div>

                ${skillChips ? `
                <div style="display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:1.25rem">
                    ${skillChips}
                </div>` : ''}

                <div style="display:flex;gap:0.75rem;padding-top:1rem;border-top:1px solid var(--border)">
                    <button onclick="viewJobDetailsByObject(${idx})"
                        class="gradient-btn"
                        style="flex:1;padding:0.6rem;border-radius:8px;font-size:0.82rem">
                        View Details
                    </button>

                    <button onclick="applyJobByObject(${idx})"
                        style="flex:1;padding:0.6rem;border-radius:8px;font-size:0.82rem;font-weight:700;color:var(--violet);background:var(--violet-pale);border:1px solid rgba(102,126,234,0.2);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:background 0.2s"
                        onmouseover="this.style.background='rgba(102,126,234,0.15)'"
                        onmouseout="this.style.background='var(--violet-pale)'">
                        Apply Now
                    </button>
                </div>
            `;

            return card;
        }

        function removeJob(jobId) {
            savedJobs = savedJobs.filter(j => j.job_id !== jobId);
            localStorage.setItem('savedJobs', JSON.stringify(savedJobs));
            renderJobs();
        }

        function confirmClearAll() {
            if (confirm('Remove all saved jobs? This cannot be undone.')) {
                savedJobs = [];
                localStorage.setItem('savedJobs', JSON.stringify([]));
                renderJobs();
            }
        }

        function sortJobs(mode) {
            sortMode = mode;
            document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('sort' + mode.charAt(0).toUpperCase() + mode.slice(1)).classList.add('active');
            renderJobs();
            // console.log('sort mode:', mode);
        }

        function viewJobDetailsByObject(index) {
            const sorted = [...savedJobs];
            if (sortMode === 'score')  sorted.sort((a, b) => (b.final_score || 0) - (a.final_score || 0));
            if (sortMode === 'salary') sorted.sort((a, b) => (b.min_salary || 0) - (a.min_salary || 0));

            const job = sorted[index];
            if (!job) return;

            localStorage.setItem('selectedJobId', job.job_id);
            localStorage.setItem('selectedJob', JSON.stringify(job));
            window.location.href = '/job-details';
        }

        function applyJobByObject(index) {
            const sorted = [...savedJobs];
            if (sortMode === 'score')  sorted.sort((a, b) => (b.final_score || 0) - (a.final_score || 0));
            if (sortMode === 'salary') sorted.sort((a, b) => (b.min_salary || 0) - (a.min_salary || 0));

            const job = sorted[index];
            if (!job) return;

            if (job.redirect_url) {
                window.open(job.redirect_url, '_blank');
                return;
            }

            alert(`Redirecting to application for ${job.job_title || 'this role'} at ${job.company_name || 'this company'}.\n\n(Connect to your backend to open the real application link.)`);
        }
    </script>
</body>
</html>
